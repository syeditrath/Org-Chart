<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion Arabia Organisation Chart 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  height: 36px; /* Adjust height as needed */
  width: auto;
  display: block;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #EEF2FA; min-height: 100vh; }

.header {
  background: #0B1D51;
  padding: 20px 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 4px solid #3B82F6;
}
.header h1 { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: .06em; text-transform: uppercase; }
.header .yr { font-size: 11px; color: rgba(255,255,255,.35); margin-left: 10px; letter-spacing: .18em; }
.tabs { display: flex; gap: 6px; }
.tab { padding: 7px 18px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all .15s; }
.tab.on  { background: #3B82F6; color: #fff; }
.tab.off { background: rgba(255,255,255,.1); color: rgba(255,255,255,.55); }
.tab.off:hover { background: rgba(255,255,255,.2); color: #fff; }

.view { display: none; }
.view.show { display: block; }

/* ── Chart ── */
#chart-view { padding: 40px; overflow: auto; }
#canvas { position: relative; }
#svg-layer { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

.node {
  position: absolute;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(11,29,81,.18), 0 1px 3px rgba(0,0,0,.1);
  transition: transform .15s, box-shadow .15s;
}
.node:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(11,29,81,.25); }
.node-stripe { height: 5px; background: #3B82F6; }
.node-body   { padding: 11px 13px 13px; }
.node-name   { font-size: 11.5px; font-weight: 700; color: #fff; line-height: 1.3; }
.node-title  { font-size: 9.5px; font-weight: 400; color: rgba(255,255,255,.68); margin-top: 4px; line-height: 1.4; }

.bg-ceo { background: #0B1D51; }
.bg-md  { background: #0369A1; }
.bg-mgr { background: #3730A3; }
.bg-stf { background: #065F46; }
.bg-ops { background: #92400E; }

.legend {
  display: flex; flex-wrap: wrap; gap: 14px;
  margin-top: 28px; padding: 13px 18px;
  background: #fff; border-radius: 10px; width: fit-content;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}
.leg { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: #475569; font-weight: 500; }
.leg-sq { width: 11px; height: 11px; border-radius: 3px; }

/* ── Data ── */
#data-view { padding: 30px 40px 60px; }
.dbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.dbar h2 { font-size: 17px; font-weight: 700; color: #0B1D51; }
.dnote { margin-top: 6px; font-size: 11px; color: #3B82F6; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 6px; padding: 6px 12px; }
.btn-add { background: #1547C0; color: #fff; border: none; padding: 9px 18px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-add:hover { background: #1240A8; }

table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.07); font-size: 12.5px; }
thead th { padding: 12px 14px; background: #0B1D51; text-align: left; font-size: 10px; font-weight: 700; color: rgba(255,255,255,.75); letter-spacing: .08em; text-transform: uppercase; }
tbody td { padding: 9px 14px; color: #334155; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #F8FAFF; }
td[contenteditable] { outline: none; cursor: text; border-radius: 3px; }
td[contenteditable]:focus { background: #EFF6FF; box-shadow: inset 0 0 0 2px #3B82F6; }
.id-c { color: #94a3b8; font-weight: 600; font-size: 11px; }
select.gs { border: 1px solid #E2E8F0; border-radius: 5px; padding: 3px 7px; font-family: inherit; font-size: 11px; background: #fff; cursor: pointer; }
.btn-del { background: none; border: 1px solid #FECACA; color: #DC2626; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <!-- GitHub Pages absolute path -->
    <img src="logo.png" class="logo" alt="Company Logo">
    <h1>Scorpion Arabia Organisation Chart<span class="yr">· 2026</span></h1>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="show('chart')">📊 Org Chart</button>
    <button class="tab off" onclick="show('data')">✏️ Edit Data</button>
  </div>
</div>
  <script>
// Hide data tab by default
const dataTab = document.getElementById('data-tab');
const accessPwd = prompt("Enter password for Edit Data access:");
if(accessPwd === 'Scorpion@1991'){ // <-- change this to your password
  dataTab.style.display = 'inline-flex';
}
</script>

<div id="chart-view" class="view show">
  <div id="canvas"><svg id="svg-layer"></svg></div>
  <div class="legend">
    <div class="leg"><div class="leg-sq" style="background:#0B1D51"></div>CEO</div>
    <div class="leg"><div class="leg-sq" style="background:#0369A1"></div>Managing Director</div>
    <div class="leg"><div class="leg-sq" style="background:#3730A3"></div>Department Manager</div>
    <div class="leg"><div class="leg-sq" style="background:#065F46"></div>Staff / Engineer</div>
    <div class="leg"><div class="leg-sq" style="background:#92400E"></div>Operations / HSE</div>
  </div>
</div>

<div id="data-view" class="view">
  <div class="dbar">
    <div>
      <h2>Master Data</h2>
      <div class="dnote">💡 Edit any cell below — switch to Org Chart to see changes instantly.</div>
    </div>
    <button class="btn-add" onclick="addRow()">+ Add Employee</button>
  </div>
  <table>
    <thead><tr><th>ID</th><th>Parent ID</th><th>Name</th><th>Designation</th><th>Group</th><th>Dept</th><th></th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
let data = [
  {id:1,  par:null, name:"IAN LOGAN JAMES",     title:"CHIEF EXECUTIVE OFFICER",         grp:"ceo"},
  {id:2,  par:1,    name:"JAWEED ALI",           title:"BUSINESS DEVELOPMENT MANAGER",    grp:"mgr"},
  {id:3,  par:1,    name:"MOHAMED AHMED AZMI",   title:"MANAGING DIRECTOR",               grp:"md"},
  {id:7,  par:1,    name:"SIVA",                 title:"HDD MANAGER",                     grp:"mgr"},
  {id:4,  par:2,    name:"YAQUB YOUSEF",         title:"PUBLIC RELATIONS MANAGER",        grp:"mgr"},
  {id:8,  par:3,    name:"SYED FAIZAN",          title:"FINANCIAL ANALYST",               grp:"stf"},
  {id:10, par:3,    name:"SATENDRA KUMAR",       title:"ESTIMATION & PLANNING MANAGER",   grp:"mgr"},
  {id:11, par:3,    name:"SYED JASIM",           title:"PROCUREMENT INCHARGE",            grp:"stf"},
  {id:18, par:3,    name:"SALMAN KHAN",          title:"DOCUMENT CONTROLLER",             grp:"stf"},
  {id:14, par:7,    name:"REY BORNALES",         title:"DESIGNING ENGINEER",              grp:"stf"},
  {id:15, par:7,    name:"SATYA SRIKANTH",       title:"HDD PLANNING ENGINEER",           grp:"stf"},
  {id:16, par:7,    name:"NAVNATH",              title:"HDD OPERATION MANAGER",           grp:"ops"},
  {id:17, par:7,    name:"SHANKER",              title:"HSE MANAGER",                     grp:"ops"},
  {id:5,  par:4,    name:"DHIA YOUSEF",          title:"GOVT RELATIONS CLERK",            grp:"stf"},
  {id:6,  par:4,    name:"SHEMEER",              title:"OFFICE BOY / DRIVER",             grp:"stf"},
  {id:9,  par:8,    name:"MUHAMMAD OWAIS",       title:"ACCOUNTANT",                      grp:"stf"},
  {id:12, par:10,   name:"FAIZOUR RAHMAN",       title:"ESTIMATION ENGINEER",             grp:"stf"},
  {id:13, par:10,   name:"SYED ITRATH",          title:"SALES AND ESTIMATION ENGINEER",   grp:"stf"},
];

// ════════════════════════════════════════════
//  LAYOUT ENGINE
//  Key insight: place(id, leftEdge, depth)
//  A node's centre = leftEdge + subtreeWidth/2
//  Children are packed left-to-right from leftEdge
// ════════════════════════════════════════════
const CW   = 158;
const CH   = 72;
const HGAP = 18;
const VGAP = 82;
const PAD  = 40;

function kids(id) { return data.filter(d => d.par === id); }

// Memoize subtree widths for performance
const _sw = {};
function sw(id) {
  if (_sw[id] !== undefined) return _sw[id];
  const ch = kids(id);
  if (!ch.length) return _sw[id] = CW;
  const inner = ch.reduce((s,c) => s + sw(c.id), 0) + (ch.length-1)*HGAP;
  return _sw[id] = Math.max(CW, inner);
}

function buildLayout() {
  // Clear memo when data changes
  Object.keys(_sw).forEach(k => delete _sw[k]);

  const pos = {};  // id -> {x (centre), y (top)}

  function place(id, left, depth) {
    const w  = sw(id);
    const cx = left + w / 2;           // this node sits at centre of its subtree
    pos[id]  = { x: cx, y: depth * (CH + VGAP) };

    let cursor = left;
    kids(id).forEach(c => {
      place(c.id, cursor, depth + 1);
      cursor += sw(c.id) + HGAP;
    });
  }

  const root = data.find(d => !d.par);
  if (root) place(root.id, 0, 0);
  return pos;
}

// ════════════════════════════════════════════
//  RENDER CHART
// ════════════════════════════════════════════
const BG = {ceo:'bg-ceo', md:'bg-md', mgr:'bg-mgr', stf:'bg-stf', ops:'bg-ops'};

function renderChart() {
  const canvas = document.getElementById('canvas');

  // Remove old nodes but keep SVG
  Array.from(canvas.children).forEach(el => {
    if (el.id !== 'svg-layer') el.remove();
  });

  const pos = buildLayout();
  const allX = Object.values(pos).map(p => p.x);
  const allY = Object.values(pos).map(p => p.y);
  const W = Math.max(...allX) + CW/2 + PAD*2;
  const H = Math.max(...allY) + CH   + PAD*2;

  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  // Draw cards
  data.forEach(d => {
    const p = pos[d.id];
    if (!p) return;
    const el = document.createElement('div');
    el.className  = `node ${BG[d.grp] || 'bg-stf'}`;
    el.dataset.id = d.id;
    el.style.width  = CW + 'px';
    el.style.height = CH + 'px';
    el.style.left   = (p.x - CW/2 + PAD) + 'px';
    el.style.top    = (p.y + PAD) + 'px';
    el.innerHTML = `<div class="node-stripe"></div><div class="node-body"><div class="node-name">${d.name}</div><div class="node-title">${d.title}</div></div>`;
    canvas.appendChild(el);
  });

  drawLines(pos, W, H);
}

function drawLines(pos, W, H) {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';
  svg.setAttribute('width',  W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  function seg(x1,y1,x2,y2) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke','#94A3C8');
    l.setAttribute('stroke-width','2');
    l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);
  }
  function dot(x,y) {
    const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute('cx',x); c.setAttribute('cy',y);
    c.setAttribute('r','4'); c.setAttribute('fill','#3B82F6');
    svg.appendChild(c);
  }

  // For every node that has children:
  //   1. Stem: straight down from bottom-centre of parent to bus-Y
  //   2. Bus:  horizontal line connecting all children centres at bus-Y
  //   3. Drops: vertical from bus-Y down to top-centre of each child
  data.forEach(parent => {
    const ch = kids(parent.id);
    if (!ch.length) return;
    const pp = pos[parent.id];
    if (!pp) return;

    const stemX  = pp.x + PAD;
    const stemY0 = pp.y + CH + PAD;           // bottom of parent card
    const busY   = stemY0 + VGAP * 0.44;      // bus line

    // 1. Stem
    seg(stemX, stemY0, stemX, busY);

    // child centres
    const cxs = ch.map(c => pos[c.id].x + PAD);

    // 2. Bus (only if >1 child)
    if (ch.length > 1) {
      seg(Math.min(...cxs), busY, Math.max(...cxs), busY);
    }

    // 3. Drops
    ch.forEach(c => {
      const cp   = pos[c.id];
      const cx   = cp.x + PAD;
      const cTop = cp.y + PAD;
      seg(cx, busY, cx, cTop);
      dot(cx, cTop);
    });
  });
}

// ════════════════════════════════════════════
//  RENDER TABLE
// ════════════════════════════════════════════
const GRP_OPTS  = ['ceo','md','mgr','stf','ops'];
const GRP_LABEL = {ceo:'CEO', md:'MD', mgr:'MANAGER', stf:'STAFF', ops:'OPS'};

function renderTable() {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  data.forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="id-c">${d.id}</td>
      <td contenteditable data-f="par"   data-id="${d.id}" style="color:#94a3b8;font-weight:600">${d.par??''}</td>
      <td contenteditable data-f="name"  data-id="${d.id}" style="font-weight:600;color:#1e293b">${d.name}</td>
      <td contenteditable data-f="title" data-id="${d.id}" style="color:#475569">${d.title}</td>
      <td>
        <select class="gs" data-id="${d.id}" onchange="setGrp(this)">
          ${GRP_OPTS.map(g=>`<option value="${g}"${d.grp===g?' selected':''}>${GRP_LABEL[g]}</option>`).join('')}
        </select>
      </td>
      <td contenteditable data-f="dept" data-id="${d.id}" style="color:#94a3b8">${d.dept||''}</td>
      <td>${d.id===1?'':'<button class="btn-del" onclick="delRow('+d.id+')">✕</button>'}</td>`;
    tb.appendChild(tr);
  });

  tb.querySelectorAll('[contenteditable]').forEach(td => {
    td.addEventListener('blur', () => {
      const row = data.find(d => d.id === +td.dataset.id);
      if (!row) return;
      const val = td.innerText.trim();
      const f   = td.dataset.f;
      if (f === 'par') row.par = val === '' ? null : +val;
      else row[f] = val;
    });
  });
}

function setGrp(sel) {
  const row = data.find(d => d.id === +sel.dataset.id);
  if (row) row.grp = sel.value;
}
function delRow(id) {
  if (!confirm('Remove this employee?')) return;
  data = data.filter(d => d.id !== id && d.par !== id);
  renderTable();
}
function addRow() {
  const newId = Math.max(...data.map(d=>d.id)) + 1;
  data.push({id:newId, par:1, name:'NEW EMPLOYEE', title:'DESIGNATION', grp:'stf', dept:''});
  renderTable();
}

// ════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════
function show(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('show'));
  document.getElementById(tab+'-view').classList.add('show');
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.className = 'tab ' + (['chart','data'][i]===tab ? 'on' : 'off');
  });
  if (tab === 'chart') renderChart();
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
renderChart();
renderTable();
window.addEventListener('resize', () => {
  if (document.getElementById('chart-view').classList.contains('show')) renderChart();
});
</script>
</body>
</html>
